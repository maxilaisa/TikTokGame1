<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map editor — TikTok Live War</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/map-editor.css" />
  </head>
  <body class="editor-body">
    <canvas id="editor-canvas" width="1920" height="1080"></canvas>

    <aside id="editor-panel">
      <h1>Map editor</h1>
      <p class="editor-lead">
        Place turrets &amp; <strong>minion meet points</strong>. Orange circles = turret attack range.
      </p>

      <div class="coord-box">
        <div>Cursor</div>
        <code id="cursor-coords">— , —</code>
      </div>
      <div class="coord-box highlight">
        <div>Last click</div>
        <code id="click-coords">(none)</code>
      </div>

      <label class="toggle-row">
        <input type="checkbox" id="show-ranges" checked />
        Show turret range
      </label>

      <fieldset>
        <legend>Lane</legend>
        <div class="lane-btns">
          <button type="button" class="lane-btn active" data-lane="top">Top</button>
          <button type="button" class="lane-btn" data-lane="mid">Mid</button>
          <button type="button" class="lane-btn" data-lane="bot">Bot</button>
          <button type="button" class="lane-btn" data-lane="base">Base</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Tool</legend>
        <button type="button" class="place-btn active" data-mode="meet">Minion meet (lane)</button>
        <button type="button" class="place-btn" data-mode="blue-defend1">Blue defend 1</button>
        <button type="button" class="place-btn" data-mode="blue-defend2">Blue defend 2</button>
        <button type="button" class="place-btn" data-mode="blue-last">Blue last</button>
        <button type="button" class="place-btn" data-mode="blue-base">Blue base</button>
        <button type="button" class="place-btn" data-mode="red-defend1">Red defend 1</button>
        <button type="button" class="place-btn" data-mode="red-defend2">Red defend 2</button>
        <button type="button" class="place-btn" data-mode="red-last">Red last</button>
        <button type="button" class="place-btn" data-mode="red-base">Red base</button>
      </fieldset>

      <div class="editor-actions">
        <button type="button" id="undo-btn">Undo turret</button>
        <button type="button" id="clear-btn">Clear turrets</button>
      </div>

      <ul id="turret-list" class="point-list"></ul>

      <div class="editor-actions primary">
        <button type="button" id="apply-btn">Apply to game</button>
        <button type="button" id="open-game-btn">Open game</button>
        <button type="button" id="reset-btn">Reset defaults</button>
      </div>

      <textarea id="export-json" readonly rows="10"></textarea>
      <button type="button" id="copy-btn">Copy JSON</button>
      <p class="editor-footer"><a href="/">← Back to game</a></p>
    </aside>

    <div id="toast" hidden></div>

    <script src="/js/map-config.js"></script>
    <script src="/js/map-editor.js"></script>
  </body>
</html>
