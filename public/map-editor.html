<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turret placement — TikTok Live War</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/map-editor.css" />
  </head>
  <body class="editor-body">
    <canvas id="editor-canvas" width="1920" height="1080"></canvas>

    <aside id="editor-panel">
      <h1>Turret editor</h1>
      <p class="editor-lead">Place <strong>defending</strong> (outer) and <strong>main</strong> (inner) turrets. Coords are 1920×1080.</p>

      <div class="coord-box">
        <div>Cursor</div>
        <code id="cursor-coords">— , —</code>
      </div>
      <div class="coord-box highlight">
        <div>Last click</div>
        <code id="click-coords">(none)</code>
      </div>

      <fieldset>
        <legend>Lane</legend>
        <div class="lane-btns">
          <button type="button" class="lane-btn active" data-lane="top">Top</button>
          <button type="button" class="lane-btn" data-lane="mid">Mid</button>
          <button type="button" class="lane-btn" data-lane="bot">Bot</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Place turret (click map)</legend>
        <button type="button" class="place-btn" data-mode="blue-defend">Blue defend</button>
        <button type="button" class="place-btn" data-mode="blue-main">Blue main</button>
        <button type="button" class="place-btn" data-mode="red-defend">Red defend</button>
        <button type="button" class="place-btn active" data-mode="red-main">Red main</button>
      </fieldset>

      <div class="editor-actions">
        <button type="button" id="undo-btn">Undo last</button>
        <button type="button" id="clear-btn">Clear all turrets</button>
      </div>

      <ul id="turret-list" class="point-list"></ul>

      <div class="editor-actions primary">
        <button type="button" id="apply-btn">Apply to game</button>
        <button type="button" id="open-game-btn">Open game</button>
        <button type="button" id="reset-btn">Reset defaults</button>
      </div>

      <label class="export-label" for="export-json">JSON (send to dev):</label>
      <textarea id="export-json" readonly rows="10"></textarea>
      <button type="button" id="copy-btn">Copy JSON</button>

      <p class="editor-footer"><a href="/">← Back to game</a></p>
    </aside>

    <div id="toast" hidden></div>

    <script src="/js/map-config.js"></script>
    <script src="/js/map-editor.js"></script>
  </body>
</html>
